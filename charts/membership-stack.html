<style>
  :root {
    --page: #F0F2EC; --card: #FFFFFF; --ink: #191D13; --ink-soft: #404633;
    --muted: #878D79; --faint: #B4B9A8; --line: #EEF0E7; --line-mid: #E4E7DA;
    --black: #17190F;
    --t1: #F5F6F3; --ink1: #6E7464; --card1: #C9CEBE;
    --t2: #F1F8DD; --ink2: #5E8A00; --card2: #AEE63F;
    --t3: #FBF3D4; --ink3: #9A7500; --ink3d: #45390F; --card3: #F3C63C;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; line-height: 1.4; }
  .page { max-width: 920px; margin: 0 auto; padding: clamp(20px,4vw,40px) 16px 64px; }
  .page-note { text-align: center; color: var(--muted); font-size: 13px; margin: 0 auto 28px; max-width: 34em; line-height: 1.6; }
  .page-note b { color: var(--ink-soft); }
  .pair { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
  .chart-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .chart-cap { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

  .chart { width: 400px; max-width: calc(100vw - 32px); background: var(--card); overflow: hidden; }
  .chart-head { padding: 20px 20px 14px; text-align: center; }
  .chart-head h2 { font-size: 20px; font-weight: 800; letter-spacing: -.02em; margin: 0; }
  .chart-head p { font-size: 13px; margin: 5px 0 0; color: var(--muted); font-weight: 500; }
  .chart-head p b { color: var(--ink2); font-weight: 700; }

  .cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; align-items: stretch; }
  .col { padding: 12px 7px 13px; display: flex; flex-direction: column; min-width: 0; }
  .col.c1 { background: var(--t1); }
  .col.c2 { background: var(--t2); }
  .col.c3 { background: var(--t3); }

  .role { font-size: 9.5px; font-weight: 700; letter-spacing: .04em; text-align: center; margin-bottom: 5px; }
  .c1 .role { color: var(--ink1); } .c2 .role { color: var(--ink2); } .c3 .role { color: var(--ink3); }
  .card-tag { align-self: center; display: inline-flex; flex-direction: column; align-items: center;
    background: var(--black); border-radius: 7px; padding: 6px 12px 5px; }
  .card-tag .ct-en { font-size: 14px; font-weight: 800; line-height: 1.05; }
  .card-tag .ct-cn { font-size: 9px; font-weight: 700; letter-spacing: .04em; margin-top: 2px; opacity: .92; }
  .c1 .card-tag .ct-en, .c1 .card-tag .ct-cn { color: var(--card1); }
  .c2 .card-tag .ct-en, .c2 .card-tag .ct-cn { color: var(--card2); }
  .c3 .card-tag .ct-en, .c3 .card-tag .ct-cn { color: var(--card3); }

  .inc { margin: 11px 0 3px; text-align: center; font-size: 10.5px; font-weight: 800;
    padding: 4px; border-radius: 5px; line-height: 1.2; }
  .c2 .inc { color: var(--ink2); background: #E4F2C0; }
  .c3 .inc { color: var(--ink3d); background: #F5E29C; }
  .add { font-size: 8.5px; font-weight: 800; letter-spacing: .14em; color: var(--faint); margin: 7px 0 6px; text-align: center; }
  .add.top { margin-top: 11px; }

  ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 7px; }
  li { display: flex; gap: 5px; align-items: flex-start; font-size: 11.5px; font-weight: 600; color: var(--ink-soft); line-height: 1.25; }
  li .dot { flex-shrink: 0; margin-top: 1px; }
  li .dot svg { display: block; }
  .c1 li .dot svg { stroke: var(--ink1); } .c2 li .dot svg { stroke: var(--ink2); } .c3 li .dot svg { stroke: var(--ink3d); }
  li.muted { color: var(--muted); font-weight: 500; }

  .quota { margin-top: 11px; padding: 9px 5px; border-radius: 6px; }
  .c1 .quota { background: #ECEEE8; } .c2 .quota { background: #E7F3C6; } .c3 .quota { background: #F6E6A6; }
  .quota .qh { font-size: 8.5px; font-weight: 800; letter-spacing: .12em; margin-bottom: 6px; }
  .c1 .quota .qh { color: var(--ink1); } .c2 .quota .qh { color: var(--ink2); } .c3 .quota .qh { color: var(--ink3d); }
  .qline { display: flex; justify-content: space-between; align-items: baseline; gap: 4px; font-variant-numeric: tabular-nums; }
  .qline + .qline { margin-top: 4px; }
  .qline .qk { font-size: 10px; font-weight: 600; color: var(--muted); white-space: nowrap; }
  .qline .qv { font-size: 10.5px; font-weight: 800; white-space: nowrap; }
  .c1 .qline .qv { color: var(--ink1); } .c2 .qline .qv { color: var(--ink2); } .c3 .qline .qv { color: var(--ink3d); }

  .soon { margin-top: 10px; font-size: 10.5px; font-weight: 700; line-height: 1.35; display: flex; align-items: center; gap: 5px; }
  .soon .tag { display: inline-block; font-size: 8.5px; font-weight: 800; letter-spacing: .06em;
    padding: 1px 6px; border-radius: 999px; border: 1px solid currentColor; flex-shrink: 0; }
  .c2 .soon { color: var(--ink2); } .c3 .soon { color: var(--ink3); }

  .spacer { flex: 1; }
  .chart-foot { border-top: 1px solid var(--line-mid); padding: 10px 16px 14px; font-size: 9.5px;
    color: var(--faint); line-height: 1.6; text-align: center; }
</style>

<div class="page">
  <p class="page-note"><b>会员权益图 · 叠加版 B</b> —— 每档只列「含前一档 + 本档新增」，用量信息左右对齐。</p>
  <div class="pair" id="charts"></div>
</div>

<script>
  const DOT = '<span class="dot"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>';

  const D = {
    title: '三档会员体系', sub: '匹配训练阶段 · <b>买 ATOM 即享 Plus</b>',
    cols: [
      { cls: 'c1', role: '入门训练', en: 'Basic', cn: '免费版',
        feats: ['基础动作库', '手动编排课程', '自助训练日志', '手表心率同步'],
        quota: [['AI 对话', '10 次/月']] },
      { cls: 'c2', role: '日常训练', en: 'Plus', cn: '进阶会员',
        inc: '含 Basic 全部',
        feats: ['智能训练计划', '自动计数计次', '动作指导与纠错', '课后训练报告', '视频存储与回放', 'TV 投屏训练'],
        muted: ['高级分析 · 可预览'],
        quota: [['AI 对话', '100 次/月'], ['实时指导', '20 小时/月'], ['云端存储', '5GB']] },
      { cls: 'c3', role: '进阶提升', en: 'Pro', cn: '专业会员',
        inc: '含 Plus 全部',
        feats: ['动作质量分析', '力线分析', 'VBT 速度分析', '高级课后报告'],
        quota: [['AI 对话', '无限'], ['实时指导', '200 小时/月'], ['云端存储', '200GB']],
        soon: ['自由动作识别', '亲友多账号'] }
    ],
    foot: '基础功能永久免费 · 每台 ATOM 随机附赠 Plus 进阶会员<br>「即将」为开发中功能，未来版本升级解锁<br>Plus / Pro 为 ATOM App 会员（BodyPark），与电商平台会员无关'
  };

  function col(c) {
    let h = `<div class="col ${c.cls}">
      <span class="role">${c.role}</span>
      <span class="card-tag"><span class="ct-en">${c.en}</span><span class="ct-cn">${c.cn}</span></span>`;
    if (c.inc) h += `<div class="inc">${c.inc}</div><div class="add">本档新增</div>`;
    else h += `<div class="add top">包含功能</div>`;
    h += `<ul>`;
    c.feats.forEach(f => h += `<li>${DOT}<span>${f}</span></li>`);
    (c.muted || []).forEach(m => h += `<li class="muted">${DOT}<span>${m}</span></li>`);
    h += `</ul>`;
    if (c.quota) {
      h += `<div class="quota"><div class="qh">使用额度</div>`;
      c.quota.forEach(q => h += `<div class="qline"><span class="qk">${q[0]}</span><span class="qv">${q[1]}</span></div>`);
      h += `</div>`;
    }
    (c.soon || []).forEach(sn => h += `<div class="soon"><span class="tag">即将</span><span>${sn}</span></div>`);
    h += `<div class="spacer"></div></div>`;
    return h;
  }

  document.getElementById('charts').innerHTML = `
    <div class="chart-wrap"><span class="chart-cap">国内版 · 叠加式</span>
      <div class="chart">
        <div class="chart-head"><h2>${D.title}</h2><p>${D.sub}</p></div>
        <div class="cols">${D.cols.map(col).join('')}</div>
        <div class="chart-foot">${D.foot}</div>
      </div>
    </div>`;
</script>
